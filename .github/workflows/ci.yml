name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scraper-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scraper-service/package-lock.json
      - run: npm ci || npm install
      - run: npm run start --if-present

  main-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: main-backend/package-lock.json
      - run: npm ci || npm install
      - run: npm run start --if-present

  flutter-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter-app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
