name: gold_family_app
description: InstaGold - track gold prices and manage family gold assets in Egypt
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_auth: ^5.4.0
  firebase_core: ^3.10.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  google_sign_in: ^6.2.2
  html: ^0.15.5
  http: ^1.2.2
  intl: ^0.20.2
  path: ^1.9.0
  sqflite: ^2.4.1
  file_picker: ^8.1.4
  path_provider: ^2.1.4
  archive: ^3.6.1
  open_filex: ^4.5.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.13
  google_mobile_ads: ^5.3.1
  shared_preferences: ^2.5.5


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/ig_icon_foreground.png"
  adaptive_icon_background: "#0B0B0D"
  adaptive_icon_foreground: "assets/icons/ig_icon_foreground.png"
  ios_content_mode: center
  ios_background_color: "#0B0B0D"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png
    - assets/icons/ig_logo.png
    - assets/icons/ig_logo_mark.png
    - assets/icons/ring.png
    - assets/icons/necklace.png
    - assets/icons/bracelet.png
    - assets/icons/coin.png
    - assets/icons/ingot.png
